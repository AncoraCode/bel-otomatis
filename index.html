<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Bel Digital Sekolah Pro</title>
    <style>
        :root {
            --bg: #2e3440;
            --card: #3b4252;
            --text: #eceff4;
            --accent: #88c0d0;
            --danger: #bf616a;
            --success: #a3be8c;
            --warning: #ebcb8b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }


        h2,
        h3 {
            margin: 0;
            color: var(--accent);
        }

        .status-tag {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .status-off {
            background: var(--danger);
        }

        .status-on {
            background: var(--success);
        }


        button {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            padding: 12px 20px;
        }

        .btn-add {
            background: var(--accent);
            color: var(--bg);
            font-size: 16px;
        }

        .btn-run {
            background: var(--success);
            color: var(--bg);
        }

        .btn-stop {
            background: var(--danger);
            color: var(--text);
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }


        .day-group {
            margin-top: 25px;
        }

        .day-title {
            font-size: 18px;
            font-weight: bold;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #434c5e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .item-info b {
            font-size: 20px;
            display: block;
            color: var(--text);
        }

        .item-info span {
            font-size: 14px;
            color: #d8dee9;
        }


        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            width: 400px;
            border: 1px solid var(--accent);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #4c566a;
            border: 1px solid #d8dee9;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .action-btns button {
            padding: 8px 12px;
            font-size: 12px;
            margin-left: 5px;
        }

        .footer {
            margin-top: auto;
            padding: 30px 0 10px 0;
            text-align: center;
            width: 100%;
        }

        .footer-text {
            font-size: 12px;
            color: #d8dee9;
            opacity: 0.5;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .footer-icon {
            color: var(--accent);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="header">
        <div>
            <h2>Sistem Bel Digital Sekolah</h2>
            <p>Status: <span id="status" class="status-tag status-off">OFF</span></p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-run" onclick="runApp()">START</button>
            <button class="btn-stop" onclick="stopApp()">STOP</button>
            <button class="btn-add" onclick="bukaModalTambah()">+ TAMBAH JADWAL</button>
        </div>
    </div>

    <div id="list">

    </div>

   


    <div id="modalTambah" class="modal">
        <div class="modal-content">
            <h3>Tambah Jadwal Baru</h3>
            <select id="hari">
                <option>Senin</option>
                <option>Selasa</option>
                <option>Rabu</option>
                <option>Kamis</option>
                <option>Jumat</option>
                <option>Sabtu</option>
                <option>Minggu</option>
            </select>
            <input type="time" id="jam">
            <input type="text" id="judul" placeholder="Nama Kegiatan">
            <input type="file" id="fileAudio" accept="audio/*">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-stop" style="flex:1" onclick="tutupModal('modalTambah')">BATAL</button>
                <button class="btn-run" style="flex:1" onclick="simpanJadwalBaru()">SIMPAN</button>
            </div>
        </div>
    </div>



    <!-- Modal Edit Jadwal -->
    <div id="modalEdit" class="modal">
        <div class="modal-content">
            <h3>Edit Jadwal</h3>
            <select id="editHari">
                <option>Senin</option>
                <option>Selasa</option>
                <option>Rabu</option>
                <option>Kamis</option>
                <option>Jumat</option>
                <option>Sabtu</option>
                <option>Minggu</option>
            </select>
            <input type="time" id="editJam">
            <input type="text" id="editJudul">
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-stop" style="flex:1" onclick="tutupModal('modalEdit')">BATAL</button>
                <button class="btn-run" style="flex:1" onclick="simpanEdit()">UPDATE</button>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="footer-text">
            <span class="footer-icon">@</span> 
            <span>by ung mengajar batch 9 spentib</span>
        </div>
    </footer>

    <script src="renderer.js"></script>
</body>

</html>
